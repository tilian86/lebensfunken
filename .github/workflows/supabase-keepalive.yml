name: Supabase Keep-Alive

# Verhindert, dass das Free-Tier-Projekt nach 7 Tagen Inaktivität pausiert wird.
# Macht einmal täglich (03:00 UTC = 05:00 deutsche Zeit im Sommer) einen
# kleinen Read-Request an die Supabase-REST-API.
#
# Außerdem hält der wöchentliche workflow-eigene Commit-Free-Lauf den
# GitHub-Actions-Schedule selbst aktiv (sonst würde GitHub diesen Workflow
# nach 60 Tagen Repo-Inaktivität pausieren).

on:
  schedule:
    - cron: "0 3 * * *"      # täglich 03:00 UTC
  workflow_dispatch:           # manueller Trigger im UI

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST-API
        env:
          SUPABASE_URL: https://liqnavdghqhhavgkhgpx.supabase.co
          # Publishable Anon-Key – ist clientseitig sowieso öffentlich,
          # daher unbedenklich hier im Klartext (siehe config.js)
          SUPABASE_ANON_KEY: sb_publishable_5lEVXLCtoG6yvY1w-Q5Xcw_Y9V46rjy
        run: |
          set -u
          # Leichtgewichtiger Read auf 'profiles' (Tabelle existiert laut
          # supabase/README.md im Repo).
          # Wir akzeptieren 200/206 (OK) und auch 401/403 – die zeigen
          # immerhin, dass die Instanz läuft (Anti-False-Positive).
          # Bei transienten Errors (521/522/502 von Cloudflare, 5xx, etc.)
          # versuchen wir es bis zu 3× mit Wartezeit, damit kurze Hänger
          # nicht zu Fehl-Mails führen.
          attempt=0
          max_attempts=3
          while : ; do
            attempt=$((attempt+1))
            status=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
              --max-time 30 \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
              "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1" || echo "000")
            echo "Attempt $attempt → HTTP $status"
            case "$status" in
              200|206|401|403)
                echo "✓ Supabase ist erreichbar."
                exit 0
                ;;
            esac
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "✗ Nach $attempt Versuchen kein erfolgreicher Response."
              head -c 500 /tmp/resp.txt; echo
              exit 1
            fi
            echo "  → 60s warten und erneut versuchen…"
            sleep 60
          done
